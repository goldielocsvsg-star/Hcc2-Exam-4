<script>
/* ═══════════════════════════════════════════════
   QUESTION BANK
═══════════════════════════════════════════════ */
const RAW_Q = [

// ──────────────────────────────────────
//  MCQ  (15)
// ──────────────────────────────────────

{type:'mcq',
stem:`A nurse is assessing a client in the emergency department who is diaphoretic, has a heart rate of 118, reports chest tightness and shortness of breath, and states, "I feel like I'm dying." The nurse is aware that before attributing these findings to a panic attack, it is most important to first:`,
choices:[
  `Administer a short-acting benzodiazepine to reduce sympathetic activation and assess response`,
  `Rule out cardiac and other serious medical causes such as myocardial infarction, pulmonary embolism, or hyperthyroidism`,
  `Ask the client whether they have a previous history of panic disorder, since this confirms the diagnosis`,
  `Administer supplemental oxygen and encourage slow deep breathing to activate the parasympathetic nervous system`
],
correctIndex:1,
rationale:`The textbook explicitly states that a determination of anxiety should never be made until high-risk medical explanations — including MI, pulmonary embolism, and stroke — have been ruled out. Tachycardia, chest pain, diaphoresis, and dyspnea are classic cardiac and pulmonary symptoms. Diagnosing panic disorder without ruling out organic causes is a clinical error that can be fatal. A history of panic disorder (option C) does not exclude a concurrent cardiac event. Oxygen and breathing techniques (option D) are nursing interventions, not the first diagnostic step. Giving a benzodiazepine (option A) before ruling out cardiac etiology is premature and potentially dangerous.`
},

{type:'mcq',
stem:`A nurse is assessing a client experiencing anxiety. The client is unable to focus on any task, misperceives environmental stimuli, and is trembling. The client's anxiety level is severe enough that normal problem-solving ability is completely absent and the client expresses a sense of overwhelming terror. Using Peplau's framework, the nurse identifies this client as experiencing which level of anxiety?`,
choices:[
  `Moderate anxiety`,
  `Mild anxiety`,
  `Severe anxiety`,
  `Panic-level anxiety`
],
correctIndex:3,
rationale:`Peplau's panic level is characterized by complete loss of focus, inability to process any information, behavioral and emotional dysregulation, terror, and the patient's inability to learn anything new. Severe anxiety is characterized by significantly narrowed perceptual field and marked impairment of attention and problem-solving, but the client retains some ability to function with guidance. The client in this scenario cannot process information at all and is in complete terror — this is panic level. Mild anxiety (option B) enhances learning and has a wide perceptual field. Moderate anxiety (option A) narrows focus but leaves some functional capacity intact.`
},

{type:'mcq',
stem:`A client with schizophrenia tells the nurse, "The CIA placed a transmitter in my brain during surgery. I can prove it — there's a lump right here." The nurse recognizes this as which type of delusion?`,
choices:[
  `Grandiose delusion`,
  `Thought insertion`,
  `Somatic delusion`,
  `Ideas of reference`
],
correctIndex:2,
rationale:`A somatic delusion is a fixed false belief about one's own body, bodily functions, or health — the classic example being believing that a foreign object, organism, or device has been placed in or is affecting the body. Thought insertion (option B) involves believing that external forces are placing thoughts into the mind — not a physical device into the body. Grandiose delusions (option A) involve exaggerated beliefs about one's importance, power, or identity. Ideas of reference (option D) involve interpreting neutral external events as having personal, special meaning directed at oneself.`
},

{type:'mcq',
stem:`A nurse is caring for a client recently started on haloperidol (Haldol) who is now pacing continuously, crossing and uncrossing their legs, and states, "I can't stop moving — it's like something is forcing me." The nurse understands that this symptom differs from pseudoparkinsonism because:`,
choices:[
  `Pseudoparkinsonism presents with resting tremor, mask-like face, and shuffling gait — not an inner compulsion to move`,
  `Pseudoparkinsonism presents with repetitive lip smacking and tongue protrusion after months of therapy`,
  `Pseudoparkinsonism responds to beta-blockers and the symptoms described would respond to benztropine`,
  `Pseudoparkinsonism is a chronic syndrome that begins after 6 months of antipsychotic therapy, not acutely`
],
correctIndex:0,
rationale:`The client is experiencing akathisia — a subjective inner restlessness and compulsion to remain in constant motion. Pseudoparkinsonism mimics Parkinson's disease, presenting with cogwheel rigidity, resting tremor ("pill-rolling"), mask-like facies, shuffling gait, drooling, and akinesia — not the driven, inner-restlessness quality of akathisia. Option B describes tardive dyskinesia, not pseudoparkinsonism. Option C has the treatments reversed — akathisia responds to beta-blockers (propranolol), NOT benztropine; benztropine treats dystonia and pseudoparkinsonism. Option D describes tardive dyskinesia's chronic onset.`
},

{type:'mcq',
stem:`A client taking sertraline and a newly prescribed sumatriptan reports sudden onset agitation, tremors, rapid heart rate, and hyperreflexia. The nurse recognizes this presentation is most consistent with which condition?`,
choices:[
  `Neuroleptic malignant syndrome from dopamine receptor blockade`,
  `Serotonin syndrome from excess serotonergic activity`,
  `Acute dystonia from nigrostriatal dopamine pathway blockade`,
  `Tardive dyskinesia from long-term dopamine receptor sensitization`
],
correctIndex:1,
rationale:`Serotonin syndrome results from excess serotonergic activity — most commonly from combining two or more serotonergic agents (SSRIs + triptans, SSRIs + MAOIs, etc.). Its hallmarks are the triad of neuromuscular abnormalities (tremor, clonus, hyperreflexia, myoclonus), autonomic instability (tachycardia, diaphoresis, hypertension), and altered mental status (agitation, confusion). NMS (option A) involves antipsychotic use, lead-pipe rigidity (not hyperreflexia/clonus), and markedly elevated temperature — this client is not on an antipsychotic. Acute dystonia (option C) involves specific muscle spasms and abnormal posturing without systemic effects. Tardive dyskinesia (option D) is a chronic movement disorder, not an acute systemic syndrome.`
},

{type:'mcq',
stem:`A nurse is reviewing medication teaching with a family caring for a client newly prescribed clozapine (Clozaril). Which statement by the nurse most accurately explains why weekly CBC monitoring is required?`,
choices:[
  `Clozapine commonly causes tachycardia and hypertension, which must be monitored frequently`,
  `Clozapine can cause agranulocytosis — a life-threatening reduction in white blood cells that eliminates the body's ability to fight infection`,
  `Clozapine requires CBC monitoring because it causes polycythemia, which increases clot formation risk`,
  `Clozapine's metabolic effects on glucose and lipids require frequent bloodwork to detect diabetes early`
],
correctIndex:1,
rationale:`Clozapine's most dangerous adverse effect is agranulocytosis — a severe, potentially fatal reduction in granulocytes (white blood cells), leaving the patient unable to mount an immune response. This is why clozapine requires weekly CBC monitoring for 6 months, biweekly thereafter, and monthly after one year of stable therapy. Fever, sore throat, chills, and fatigue must prompt immediate CBC and medication hold. Option A describes general anticholinergic and cardiovascular effects, not the reason for CBC monitoring. Option C (polycythemia) is incorrect — clozapine does not cause elevated RBCs. Option D (glucose/lipid monitoring) is relevant to atypical antipsychotics generally but not the reason for CBC monitoring specifically.`
},

{type:'mcq',
stem:`During a psychoeducation session, the nurse is asked by a family member, "Why doesn't our son think he's sick? He refuses to believe the diagnosis." The nurse correctly explains that this lack of awareness of illness is called:`,
choices:[
  `Avolition — the negative symptom of reduced motivation that prevents the client from engaging with care`,
  `Diagnostic overshadowing — the tendency to attribute all symptoms to the psychiatric disorder`,
  `Anosognosia — a neurological feature of schizophrenia that impairs the client's insight into their own illness`,
  `Anhedonia — the inability to experience pleasure, including pleasure in seeking treatment`
],
correctIndex:2,
rationale:`Anosognosia is the neurological impairment of insight into one's own illness — it is a symptom of schizophrenia itself, not stubbornness or denial. The brain's capacity for self-assessment is impaired by the same pathological process causing the other symptoms. This is why it is classified as a symptom, not a character flaw, and why coercive arguments about the diagnosis are ineffective. Avolition (option A) is loss of motivation but is distinct from lack of illness awareness. Diagnostic overshadowing (option B) is the clinician's error of attributing all symptoms to the psychiatric diagnosis. Anhedonia (option D) is loss of pleasure — not relevant to illness awareness.`
},

{type:'mcq',
stem:`A client with a history of schizophrenia is admitted to the psychiatric unit and tells the nurse, "The voice is telling me to do things." Which is the nurse's priority assessment question?`,
choices:[
  `"How long has the voice been telling you to do things?"`,
  `"Are you afraid of the voice?"`,
  `"What is the voice telling you to do?"`,
  `"Do you recognize who the voice belongs to?"`
],
correctIndex:2,
rationale:`The priority is to identify the specific content of the command hallucination because the command may direct the patient to harm themselves or others — constituting an immediate psychiatric emergency. You cannot assess the level of danger without knowing what the command is. Duration of the hallucination (option A) is relevant but subordinate to immediate safety assessment. Emotional response to the voice (option B) is a secondary assessment. Identity of the voice (option D) is clinically irrelevant to the safety determination. Safety always supersedes all other assessment priorities.`
},

{type:'mcq',
stem:`A client with schizophrenia shouts, "They're all plotting to destroy me. Isn't that true?" Which response by the nurse is most therapeutic?`,
choices:[
  `"Everyone here is trying to help you. No one wants to harm you."`,
  `"That is not true. People here are trying to help you if you will let them."`,
  `"Feeling that people want to destroy you must be very frightening."`,
  `"Staff members are healthcare professionals who are qualified to help you."`
],
correctIndex:2,
rationale:`The most therapeutic response focuses on the feeling behind the delusion — fear and terror — rather than arguing against or engaging with the content. Option C validates the emotional experience (fear of being destroyed) without confirming or denying the delusional belief, which de-escalates distress and preserves the therapeutic relationship. Options A, B, and D all directly argue against the delusion's content, which increases the patient's anxiety and actually strengthens the tenacity with which they hold the belief. The textbook explicitly identifies arguing with delusions as counterproductive and non-therapeutic.`
},

{type:'mcq',
stem:`A patient experiencing acute anxiety needs a PRN anxiolytic. Looking at the patient's medication administration record, the nurse finds orders for buspirone, lorazepam, amitriptyline, and fluoxetine. Which medication is most appropriate to administer for acute anxiety relief?`,
choices:[
  `Buspirone — it is an atypical anxiolytic with no dependence risk`,
  `Fluoxetine — it is an SSRI and is the first-line medication for anxiety disorders`,
  `Amitriptyline — it is a tricyclic antidepressant effective for anxiety`,
  `Lorazepam — it is a benzodiazepine with a rapid onset appropriate for acute/PRN use`
],
correctIndex:3,
rationale:`Lorazepam (Ativan) is a benzodiazepine — fast-acting (onset 30–60 minutes), appropriate for PRN anxiolytic use in acute and crisis situations. Buspirone (option A) is an excellent long-term anxiolytic but takes 1–4 weeks to reach therapeutic effect and is absolutely not appropriate for PRN acute use. Fluoxetine (option B) is an SSRI that takes 4–6 weeks to work — not for PRN use. Amitriptyline (option C) is a tricyclic antidepressant not indicated for PRN panic management. The key principle: benzos = fast/acute/crisis; SSRIs and buspirone = slow/maintenance/long-term.`
},

{type:'mcq',
stem:`A nurse is explaining to a nursing student the difference between "first-line" and "first-generation" medications. Which statement most accurately explains this distinction?`,
choices:[
  `First-line and first-generation are interchangeable terms that both refer to the most effective medications in their class`,
  `First-generation medications are always the preferred treatment because they were developed first and have the most research`,
  `First-line refers to the treatment recommended first based on evidence and safety, while first-generation refers to the earliest medications in a class, which may have more side effects`,
  `First-line refers to medications used in the first 24 hours, while first-generation refers to medications developed in the first generation of psychiatric research`
],
correctIndex:2,

{type:'mcq',
stem:`A nurse teaches a client about diphenhydramine (Benadryl) used to treat acute dystonia from an antipsychotic. The client asks, "How does an antihistamine help with muscle spasms?" The nurse's best explanation is:`,

correctIndex:1,
rationale:`Antipsychotics block dopamine D2 receptors in the basal ganglia (nigrostriatal pathway), creating a dopamine-acetylcholine imbalance — with acetylcholine becoming relatively dominant. This imbalance produces EPS (muscle spasms, dystonia, rigidity). Diphenhydramine's significant anticholinergic properties block acetylcholine receptors, reducing acetylcholine dominance and restoring the dopamine/ACh balance — which resolves the EPS. It works by the same mechanism as benztropine (Cogentin), which is also anticholinergic. Direct dopamine agonism (option C) is not how diphenhydramine works. Option A (histamine-1 blockade causing muscle relaxation) is incorrect — the mechanism is anticholinergic, not antihistamine.`
},

rows:[
  {statement:`Severe "lead-pipe" diffuse muscle rigidity throughout the body`,correct:0,rationale:`Lead-pipe rigidity is the hallmark neuromuscular finding of NMS — the rigid form contrasts with the hyperkinetic findings of serotonin syndrome.`},
  {statement:`Clonus, hyperreflexia, and myoclonus (hyperkinetic neuromuscular findings)`,correct:1,rationale:`Clonus and hyperreflexia are the hallmark neuromuscular features of serotonin syndrome — these hyperkinetic features distinguish it from NMS's rigid presentation.`},
  {statement:`Caused by excess serotonergic activity from combining multiple serotonergic agents`,correct:1,rationale:`Serotonin syndrome results from additive/excessive serotonin activity — e.g., SSRI + triptan, SSRI + MAOI.`},
  {statement:`Caused by idiosyncratic reaction to antipsychotic/neuroleptic medications`,correct:0,rationale:`NMS is an idiosyncratic reaction to neuroleptic (antipsychotic) medications — the pathophysiology involves dopamine hypoactivity.`},
  {statement:`Markedly elevated temperature — often greater than 104°F — is a cardinal feature`,correct:0,rationale:`High fever is a cardinal feature of NMS; temperature elevation in serotonin syndrome is typically less severe than in NMS.`},
  {statement:`Treatment includes stopping the serotonergic agent; cyproheptadine may be used`,correct:1,rationale:`Serotonin syndrome treatment: stop the offending serotonergic agents, supportive care, and cyproheptadine (serotonin antagonist).`}
],
generalRationale:`The key NMS vs. serotonin syndrome differentiators: (1) NMS = lead-pipe rigidity; serotonin syndrome = clonus/hyperreflexia. (2) NMS = neuroleptic/antipsychotic cause; serotonin syndrome = excess serotonergic agents. (3) NMS = stop antipsychotic + dantrolene; serotonin syndrome = stop serotonergic agents + cyproheptadine.`
},

{type:'matrix',
stem:`A nurse is reviewing Peplau's four levels of anxiety and appropriate nursing interventions for each level. Indicate whether each characteristic belongs to Moderate Anxiety or Severe Anxiety.`,
columns:['Moderate Anxiety','Severe Anxiety'],
rows:[
  {statement:`Perceptual field is narrowed but the client can focus with guidance`,correct:0,rationale:`Moderate anxiety narrows the perceptual field — the client can still concentrate with guidance, though not optimally.`},
  {statement:`The nurse can effectively teach new information using clear, focused, step-by-step instruction`,correct:0,rationale:`Moderate anxiety still allows learning with focused teaching strategies — a key distinction from severe and panic levels where teaching is ineffective.`},
  {statement:`Significant impairment of attention and problem-solving; client tends to misperceive the environment`,correct:1,rationale:`Severe anxiety markedly impairs attention and judgment, with the client misperceiving environmental stimuli — the nurse uses simple, direct commands at this level.`},
  {statement:`Visible restlessness and muscle tension, but the client remains functional`,correct:0,rationale:`Restlessness and muscle tension at moderate anxiety still allow functional engagement with nursing support.`},
  {statement:`The nurse uses simple one-at-a-time directions; calm environment is essential`,correct:1,rationale:`At severe anxiety, the client's impaired cognition requires the nurse to give one simple directive at a time and create a calm, low-stimulus environment.`}
],
generalRationale:`Anxiety nursing care is level-dependent: mild = no intervention; moderate = refocus/educate; severe = simple directions, calm environment; panic = stay, minimize stimuli, breathing — never teach at panic level.`
},

{type:'matrix',
stem:`A nurse is assessing a client with schizophrenia. For each clinical finding, indicate whether it represents a Positive Symptom or Negative Symptom of schizophrenia.`,
columns:['Positive Symptom','Negative Symptom'],
rows:[
  {statement:`Client believes they are receiving secret communications from the television anchor (ideas of reference)`,correct:0,rationale:`Ideas of reference are a positive symptom — a delusional belief that external events have special personal meaning directed at the client.`},
  {statement:`Client has not bathed, eaten, or initiated any activity in 3 days due to profound lack of motivation (avolition)`,correct:1,rationale:`Avolition is one of the Five A's of negative symptoms — the loss of motivation to initiate goal-directed activities, including self-care.`},
  {statement:`Client repeats the nurse's exact words back immediately after they are spoken (echolalia)`,correct:0,rationale:`Echolalia is a positive symptom — a disordered speech pattern representing pathological repetition of others' words.`},
  {statement:`Client speaks in brief, empty responses with no elaboration and cannot sustain conversation (alogia)`,correct:1,rationale:`Alogia (poverty of speech) is one of the Five A's of negative symptoms — representing the loss of normal speech output.`},
  {statement:`Client reports hearing a voice telling them the nurses are trying to poison them (command hallucination)`,correct:0,rationale:`Hallucinations, including command hallucinations, are positive symptoms — perceptual distortions representing an excess of abnormal experience.`}
],
generalRationale:`Positive = added to/distortion of normal experience (hallucinations, delusions, disorganized speech). Negative = absent from normal function (Five A's: affect, alogia, avolition, anhedonia, anergia). This distinction drives antipsychotic selection.`
},

{type:'matrix',
stem:`A client is receiving education on anxiety medications prior to discharge. For each client statement, indicate whether it reflects Effective or Ineffective understanding of medication teaching.`,
columns:['Effective Understanding','Ineffective Understanding'],
rows:[
  {statement:`"I know my Paxil won't work right away — it could take a few weeks before I feel better."`,correct:0,rationale:`Understanding the 4–6 week delayed onset of SSRIs is critical for adherence — this reflects effective teaching.`},
  {statement:`"I can take my lorazepam every morning as a preventive measure so anxiety doesn't develop."`,correct:1,rationale:`Daily preventive benzodiazepine use leads to dependence and tolerance — lorazepam is for acute/PRN crisis use, not daily scheduled prevention.`},
  {statement:`"Buspirone starts working right away, so I'll take it if I feel a panic attack starting."`,correct:1,rationale:`Buspirone has a 1–4 week delayed onset and is absolutely not appropriate for acute panic relief — this reflects a dangerous misunderstanding.`},
  {statement:`"If I suddenly feel much worse or start having dark thoughts after starting my SSRI, I should call my provider right away."`,correct:0,rationale:`Recognizing early activation syndrome (increased anxiety, agitation, suicidal thoughts) with SSRI initiation and knowing to report immediately reflects highly effective teaching.`},
  {statement:`"I should avoid caffeine and alcohol because both can worsen my anxiety symptoms."`,correct:0,rationale:`Understanding that caffeine (stimulant) and alcohol (rebound anxiety) exacerbate anxiety reflects effective teaching comprehension.`}
],
generalRationale:`Key medication teaching: SSRIs = 4–6 weeks onset; benzos = fast/PRN/not daily prevention; buspirone = 1–4 weeks onset/not for acute use; SSRI activation syndrome requires immediate reporting.`
},

{type:'matrix',
stem:`A nurse is reviewing nursing interventions for a client with PTSD. Indicate whether each intervention is most appropriate for the Acute Phase or the Long-Term Phase of PTSD care.`,
columns:['Acute Phase','Long-Term Phase'],
rows:[
  {statement:`Provide a quiet, safe environment and remain calmly present with the client`,correct:0,rationale:`Safety, calm presence, and environmental comfort are immediate priorities during the acute PTSD crisis phase.`},
  {statement:`Assist the client in identifying and working through maladaptive defense mechanisms interfering with recovery`,correct:1,rationale:`Identifying and modifying maladaptive defenses is a therapeutic goal requiring a stable, trusting relationship — a long-term phase objective.`},
  {statement:`Assess for suicidal ideation including indirect cues and statements of hopelessness`,correct:0,rationale:`Safety assessment including suicide risk is always an acute priority — especially at admission and crisis presentation.`},
  {statement:`Help the client establish meaningful future goals and develop a sense of hope`,correct:1,rationale:`Future orientation and hope-building are long-term recovery goals, not acute crisis priorities.`},
  {statement:`Postpone all health teaching and psychoeducation until acute anxiety subsides`,correct:0,rationale:`The acute phase requires intervention, not education — clients in crisis cannot learn new information. Teaching must be postponed.`},
  {statement:`Support the client in progressing through the grief process and renewing significant relationships`,correct:1,rationale:`Grief work and relationship renewal are deep therapeutic processes requiring sustained engagement — long-term phase objectives.`}
],
generalRationale:`Acute PTSD = safety, grounding, presence, crisis assessment, defer teaching. Long-term = processing, grief, relationship renewal, goal-setting, coping skill development.`
},

{type:'matrix',
stem:`A nurse is reviewing documentation of a client with schizophrenia's speech patterns. For each example, indicate which speech pattern is being demonstrated: Word Salad or Clang Association.`,
columns:['Word Salad','Clang Association'],
rows:[
  {statement:`"The purple elephant bicycle sky runs tomorrow because Tuesday."`,correct:0,rationale:`Word salad is a random, incoherent mix of words with no logical connection — the hallmark is complete absence of coherent meaning.`},
  {statement:`"I need a cat with a hat on a mat who sat and ate a bat."`,correct:1,rationale:`Clang association involves choosing words based on sound and rhyming rather than meaning — the words share sound but not logic.`},
  {statement:`"River mountain clock paper telephone runs yes green before."`,correct:0,rationale:`Another example of word salad — a string of unrelated words with no semantic connection.`},
  {statement:`"My head is dead and fed with dread in bed instead."`,correct:1,rationale:`This string of rhyming words demonstrates clang association — sound drives word selection, not meaning.`}
],
generalRationale:`Word salad = incoherent jumble of unrelated words (no sound or meaning connection). Clang association = words connected by sound/rhyme rather than meaning. Both are positive symptoms representing disorganized thought processes that are frightening and frustrating for the client.`
},

{type:'matrix',
stem:`A nurse is reviewing EPS type, onset, and treatment. For each EPS presentation, indicate whether the correct treatment is Benztropine or Propranolol.`,
columns:['Benztropine (Cogentin)','Propranolol (Inderal)'],
rows:[
  {statement:`Client develops sudden eye deviation upward and neck twisting (oculogyric crisis, torticollis) 2 hours after first haloperidol dose`,correct:0,rationale:`Acute dystonia is treated with benztropine (anticholinergic) or diphenhydramine — restores dopamine-acetylcholine balance in the basal ganglia.`},
  {statement:`Client is pacing, cannot sit still, reports "driven to keep moving," and is extremely distressed`,correct:1,rationale:`Akathisia — inner restlessness — does NOT respond well to anticholinergics; beta-blockers (propranolol) have the best clinical success.`},
  {statement:`Client develops cogwheel rigidity, mask-like face, shuffling gait, and drooling after 2 weeks of risperidone`,correct:0,rationale:`Pseudoparkinsonism is treated with benztropine (anticholinergic) — the same mechanism that restores dopamine-acetylcholine balance that is disrupted by D2 blockade.`},
  {statement:`Client reports inner restlessness that makes it impossible to stay still during clinic visits or sit through meals`,correct:1,rationale:`Another akathisia presentation — the subjective inner drive to move that is distressing and often leads to medication non-adherence. Treated with propranolol (beta-blocker).`}
],
generalRationale:`EPS treatment rule: Dystonia and pseudoparkinsonism → benztropine (anticholinergic, restores dopamine/ACh balance). Akathisia → propranolol (beta-blocker). Tardive dyskinesia → neither; monitor with AIMS, consider VMAT2 inhibitors.`
},

{type:'matrix',
stem:`A nurse is evaluating a client with panic disorder at a 6-week follow-up visit. Indicate whether each client statement suggests the panic disorder treatment is Effective or Requires Further Follow-Up.`,
columns:['Indicates Effective Treatment','Requires Further Follow-Up'],
rows:[
  {statement:`"I had one panic attack this week, but I used my breathing and it passed faster than before."`,correct:0,rationale:`Shorter duration and successful use of coping strategies during panic attacks indicate effective treatment progress.`},
  {statement:`"I've stopped going to work because I'm terrified of having a panic attack there."`,correct:1,rationale:`Occupational avoidance represents agoraphobic behavior that is expanding — this indicates worsening functional impairment requiring treatment reassessment.`},
  {statement:`"I've been exercising four days a week and I really think it's helping my mood and anxiety."`,correct:0,rationale:`Regular exercise is an evidence-based component of panic disorder management and reflects adaptive, health-promoting behavior.`},
  {statement:`"I've been taking my lorazepam twice a day every day, not just when I have a panic attack."`,correct:1,rationale:`Daily scheduled benzodiazepine use — not PRN use — is a concerning pattern indicating developing dependence behavior requiring provider discussion.`},
  {statement:`"I recognize when my heart starts racing that it might be the beginning of anxiety, and I can usually manage it now."`,correct:0,rationale:`Early recognition of escalating anxiety and successful self-management represent the core long-term treatment goal of panic disorder management.`}
],
generalRationale:`Indicators of improvement: coping use during attacks, exercise adoption, early recognition. Red flags: expanding avoidance, daily scheduled benzodiazepine use, increased functional impairment.`
},

{type:'matrix',
stem:`A nurse is reviewing a client's plan of care for relapse prevention in schizophrenia. For each client statement, indicate whether it reflects Effective or Ineffective understanding of relapse prevention.`,
columns:['Effective','Ineffective'],
rows:[
  {statement:`"I know my medications are working right now, which is exactly why I need to keep taking them."`,correct:0,rationale:`Understanding that medications are working BECAUSE of ongoing adherence — not that adherence is no longer needed — demonstrates effective understanding.`},
  {statement:`"Once I feel stable, I plan to stop the medication and just use therapy alone."`,correct:1,rationale:`Stopping antipsychotic medication when feeling stable is the most common cause of relapse in schizophrenia — this reflects a dangerous misunderstanding.`},
  {statement:`"If I start sleeping less or start feeling uncomfortable around people again, I'll contact my provider."`,correct:0,rationale:`Recognizing early relapse warning signs (reduced sleep, increasing social discomfort) and knowing to contact the provider promptly reflects effective teaching.`},
  {statement:`"My family knows that if I start giving things away or acting more suspicious, they should take me to the hospital."`,correct:0,rationale:`Incorporating family into relapse surveillance — with specific warning signs — is a key and effective component of relapse prevention education.`},
  {statement:`"Drinking a few beers on weekends is fine because alcohol doesn't really affect my antipsychotic."`,correct:1,rationale:`Alcohol can worsen psychotic symptoms, impair judgment, increase non-adherence risk, and interact with antipsychotics — this reflects an important misconception to address.`}
],
generalRationale:`Effective relapse prevention: continue medication despite feeling well, know warning signs and act early, involve family, avoid substances. The most critical misconception: stopping medication when feeling better.`
},

{type:'matrix',
stem:`A nurse is preparing teaching for a client about anxiety medications. For each clinical situation, indicate whether administering a Benzodiazepine or an SSRI is the most appropriate choice.`,
columns:['Benzodiazepine','SSRI'],
rows:[
  {statement:`A client in the emergency department is having an acute panic attack with severe physiological symptoms requiring immediate relief`,correct:0,rationale:`Benzodiazepines are fast-acting (30–60 min onset) and appropriate for acute PRN anxiolytic use — this is the emergency/crisis indication.`},
  {statement:`A client newly diagnosed with panic disorder needs a first-line maintenance medication to prevent future episodes long-term`,correct:1,rationale:`SSRIs are the first-line long-term pharmacologic treatment for panic disorder — they address the neurobiological basis of anxiety without dependence risk.`},
  {statement:`A client with PTSD requires long-term pharmacologic treatment; their provider is choosing based on evidence-based guidelines`,correct:1,rationale:`SSRIs are the first-line pharmacotherapy for PTSD per evidence-based guidelines — specifically sertraline and paroxetine have FDA indications.`},
  {statement:`A client is experiencing a brief severe anxiety episode in the clinic and non-pharmacologic methods have not provided sufficient relief`,correct:0,rationale:`For acute anxiety crisis when non-pharmacologic measures are insufficient, a short-acting benzodiazepine is the appropriate PRN intervention.`}
],
generalRationale:`Benzodiazepines: acute, fast, PRN — not for long-term use. SSRIs: long-term, first-line, maintenance — not for acute/PRN relief. Understanding this distinction is fundamental for pharmacology questions.`
},

{type:'matrix',
stem:`The nurse is evaluating a client's responses during a teaching session on panic attack management. For each client statement, indicate whether it is a Correct or Incorrect understanding of panic attack physiology and management.`,
columns:['Correct Understanding','Incorrect Understanding'],
rows:[
  {statement:`"When I have a panic attack, my sympathetic nervous system is activated — that's what causes my racing heart and sweating."`,correct:0,rationale:`Sympathetic nervous system activation produces the classic fight-or-flight symptoms of panic — this is an accurate physiological understanding.`},
  {statement:`"Deep breathing during a panic attack helps because it activates my parasympathetic nervous system to counteract the fight-or-flight response."`,correct:0,rationale:`Correct — diaphragmatic breathing stimulates the vagus nerve, activating the PNS to counter the SNS activation driving panic symptoms.`},
  {statement:`"If I don't go to the ER when I have a panic attack, something bad will happen to me because I might be having a heart attack."`,correct:1,rationale:`This is the core cognitive distortion in panic disorder — catastrophic misinterpretation of benign physiological sensations as dangerous. While cardiac causes must be ruled out initially, this ongoing belief maintains the panic cycle.`},
  {statement:`"My panic attacks peak within about 10 minutes of starting, which is why they feel so intense."`,correct:0,rationale:`Correct — panic attacks are defined by abrupt onset with peak intensity within 10 minutes; understanding this can help the client ride out the attack rather than escalating fear.`},
  {statement:`"I should stay home and rest during my panic attack to avoid making it worse by exerting myself."`,correct:1,rationale:`Avoidance and isolation during panic attacks reinforce agoraphobic behaviors that worsen panic disorder long-term. Evidence-based management supports gradual engagement, not avoidance.`}
],
generalRationale:`Panic physiology: SNS activation → fight-or-flight symptoms; PNS (breathing/relaxation) counteracts. Panic attacks peak at 10 min. The cycle of avoidance and catastrophic misinterpretation maintains the disorder — CBT targets these cognitive patterns.`
},

{type:'bowtie',
stem:`A nurse on a psychiatric unit is caring for a client with schizophrenia who received their first dose of haloperidol 2 hours ago. The client is now screaming, "My eyes are rolling back — I can't control it!" and has visible neck twisting and a fixed upward gaze. The nurse identifies the priority concern as acute dystonia.`,
centerLabel:`Priority Concern`,
centerText:`Acute Dystonia from Haloperidol`,
leftLabel:`Priority Nursing Actions`,
rightLabel:`Parameters to Monitor`,
leftOptions:[
  `Administer propranolol (Inderal) as ordered for EPS symptom relief`,
  `Stay with the client and administer benztropine (Cogentin) or diphenhydramine (Benadryl) IM as ordered`,
  `Notify the HCP immediately, document the reaction, and prepare to administer anticholinergic medication`,
  `Apply cooling measures and prepare the client for ICU transfer`,
  `Administer the next scheduled dose of haloperidol to reassess response`
],
rightOptions:[
  `Vital signs, temperature, and level of consciousness for signs of NMS progression`,
  `Serum lithium level for toxicity`,
  `Resolution of muscle spasms and return to normal posture following anticholinergic administration`,
  `CBC with differential for agranulocytosis`,
  `Fasting glucose for metabolic syndrome`
],
correctLeft:[1,2],
correctRight:[0,2],
rationale:`Acute dystonia (oculogyric crisis, torticollis) is an acute EPS emergency caused by D2 blockade in the nigrostriatal pathway. Priority nursing actions: (1) stay with the client and administer anticholinergic medication (benztropine IM or diphenhydramine IV/IM) as ordered — these restore the dopamine-acetylcholine balance; (2) notify the HCP immediately and document the adverse reaction. Parameters to monitor: vital signs and LOC to ensure this is acute dystonia and not the early presentation of NMS (which would indicate a different, more serious emergency), and resolution of muscle spasms following anticholinergic administration to confirm treatment effectiveness. Propranolol treats akathisia, not dystonia. Cooling measures and ICU transfer are for NMS. Continuing haloperidol is contraindicated until the reaction is assessed.`
},

{type:'bowtie',
stem:`A nurse is caring for a client with a history of PTSD who is brought to the psychiatric emergency unit by a family member. The client is shaking, hyperventilating, and states, "I just want everything to stop — there's no point anymore." The family member reports the client gave away personal belongings yesterday. The nurse identifies the priority concern as acute crisis with suicidal ideation.`,
centerLabel:`Priority Concern`,
centerText:`Acute PTSD Crisis with Suicidal Ideation`,
leftLabel:`Priority Nursing Actions`,
rightLabel:`Parameters to Monitor`,
leftOptions:[
  `Begin comprehensive health teaching about PTSD symptom management`,
  `Administer lorazepam PRN and send the client to group therapy`,
  `Assess for suicidal plan, method, timeline, and access to lethal means immediately`,
  `Provide a calm, quiet, safe environment and remain present with the client`,
  `Ask the family to leave to give the client privacy to express their feelings`
],
rightOptions:[
  `Client's ability to identify three coping skills before discharge`,
  `Ongoing behavioral and verbal indicators of suicidal intent throughout the visit`,
  `Client's fasting glucose and lipid panel`,
  `Resolution of hyperventilation and restoration of calm breathing with interventions`,
  `WBC count for infection risk`
],
correctLeft:[2,3],
correctRight:[1,3],
rationale:`The client's indirect suicidal statement ("there's no point anymore") combined with the behavioral cue of giving away possessions constitutes an urgent psychiatric safety situation. Priority nursing actions: (1) immediate direct safety assessment — asking about plan, method, timeline, and access to lethal means (the behavioral cue of giving away possessions significantly elevates risk); (2) providing a calm, safe, quiet environment with therapeutic presence. Parameters to monitor: ongoing behavioral and verbal indicators of suicidal intent throughout the visit (this client's risk is dynamic and continuous) and physiological response including resolution of hyperventilation as a marker of de-escalation. Beginning health teaching (option 1) is contraindicated during acute crisis — the client cannot process information. Sending to group therapy is inappropriate. Asking family to leave removes a potential safety observer and support resource.`
},

{type:'bowtie',
stem:`A nurse is caring for a client who was started on haloperidol 3 days ago and is now presenting with a temperature of 104.6°F, severe diffuse muscle rigidity, tachycardia of 128, labile blood pressure, diaphoresis, and a declining level of consciousness. The nurse identifies the priority concern as neuroleptic malignant syndrome.`,
centerLabel:`Priority Concern`,
centerText:`Neuroleptic Malignant Syndrome (NMS)`,
leftLabel:`Priority Nursing Actions`,
rightLabel:`Parameters to Monitor`,
leftOptions:[
  `Administer benztropine (Cogentin) intramuscularly to treat the muscle rigidity`,
  `Stop all antipsychotic medications immediately and notify the HCP for ICU transfer`,
  `Reduce the dose of haloperidol by half and observe for the next 12 hours`,
  `Stay with the client, apply cooling measures, and initiate IV fluids and cardiac monitoring`,
  `Administer the next scheduled antipsychotic dose, then reassess temperature and rigidity`
],
rightOptions:[
  `Temperature trend in response to cooling measures`,
  `Serum creatine kinase (CK), urine output, and urine color for rhabdomyolysis and renal complications`,
  `Fasting blood glucose for metabolic syndrome development`,
  `WBC count for agranulocytosis from haloperidol`,
  `Lower extremity edema and signs of DVT given immobility, fever, and rigidity`
],
correctLeft:[1,3],
correctRight:[0,1],
rationale:`NMS is a life-threatening emergency with mortality rates of 10–20% without treatment. Priority nursing actions: (1) immediately stop all antipsychotic medications — this is the essential first pharmacological intervention — and notify the HCP with preparation for ICU transfer; (2) stay with the critically unstable patient, apply cooling measures (ice packs, cooling blankets), initiate IV fluids for hydration/renal protection, begin cardiac monitoring. Parameters to monitor: temperature trend response to cooling (fever management is essential) and CK, urine output, and urine color for rhabdomyolysis (muscle breakdown releases myoglobin → can cause acute kidney injury — this is a critical NMS complication). Benztropine does NOT treat NMS — it is for acute EPS/dystonia. Dose reduction or continuing the medication is contraindicated in NMS.`
},

{type:'bowtie',
stem:`A nurse is discharging a client newly diagnosed with panic disorder with prescriptions for paroxetine (Paxil) and lorazepam (Ativan) PRN. The client is anxious and asks multiple questions about the medications. The nurse identifies the priority concern as preventing medication misunderstanding and promoting safe adherence.`,
centerLabel:`Priority Concern`,
centerText:`Safe Medication Use: Paroxetine + PRN Lorazepam`,
leftLabel:`Priority Teaching Actions`,
rightLabel:`Parameters to Monitor`,
leftOptions:[
  `Teach that paroxetine works immediately for acute panic and lorazepam is for long-term maintenance`,
  `Clarify that paroxetine takes 4–6 weeks for full effect and lorazepam is for acute PRN use only — not daily`,
  `Instruct the client to take lorazepam every morning to prevent panic attacks from developing throughout the day`,
  `Teach the client to recognize early activation syndrome with paroxetine — increased anxiety or dark thoughts require immediate provider contact`,
  `Instruct the client that both medications can be doubled in dose if a panic attack is severe`
],
rightOptions:[
  `Frequency and scheduling pattern of lorazepam use — escalating use may indicate dependence`,
  `Paroxetine adherence and client report of mood and anxiety level at 4–6 weeks`,
  `Weekly complete blood count for SSRI bone marrow toxicity`,
  `Daily blood pressure for lorazepam hypertensive effect`,
  `Urine toxicology screen at every follow-up visit`
],
correctLeft:[1,3],
correctRight:[0,1],
rationale:`Priority teaching for this medication combination: (1) clarify the onset distinction — paroxetine takes 4–6 weeks (not immediate), and lorazepam is PRN/acute use only, not scheduled daily (prevents dependence development); (2) teach early SSRI activation syndrome — clients starting SSRIs can experience increased anxiety, agitation, or suicidal ideation early in treatment, requiring immediate provider contact. Parameters to monitor: lorazepam use pattern (escalating frequency signals developing dependence and requires provider review) and paroxetine adherence and therapeutic response at the 4–6 week mark. Weekly CBC and daily BP monitoring (options C and D) are not standard monitoring requirements for these medications. Urine tox screens at every visit are not standard practice.`
},

{type:'bowtie',
stem:`A nurse is caring for a client with schizophrenia on the inpatient psychiatric unit who suddenly becomes increasingly agitated, begins pacing, and shouts, "They are all coming to get me! I can see them through the walls!" The client moves toward a window. The nurse identifies the priority concern as acute psychotic agitation with paranoid delusions and safety risk.`,
centerLabel:`Priority Concern`,
centerText:`Acute Psychotic Agitation with Paranoid Delusions`,
leftLabel:`Priority Nursing Actions`,
rightLabel:`Parameters to Monitor`,
leftOptions:[
  `Begin comprehensive teaching about schizophrenia and medication management to redirect the client`,
  `Maintain a safe distance, position near the exit, and use a calm, low-pitched, non-threatening tone`,
  `Argue with the client about the impossibility of seeing people through walls to reorient to reality`,
  `Immediately notify the treatment team and ensure additional staff are available per safety protocol`,
  `Approach the client from behind quickly and attempt to guide them away from the window`
],
rightOptions:[
  `Client's verbalizations for escalating suicidal or homicidal content`,
  `Client's body language, posturing, and behavioral cues for escalation to physical aggression`,
  `Client's serum glucose level for hypoglycemia as a cause of agitation`,
  `Client's lipid panel for metabolic syndrome from antipsychotic therapy`,
  `Time of last antipsychotic dose and next scheduled administration`
],
correctLeft:[1,3],
correctRight:[0,1],
rationale:`Acute paranoid psychosis with safety proximity to a window requires immediate, strategic intervention. Priority actions: (1) maintain safe distance, position near the exit to protect nurse safety, and use calm non-threatening communication — paranoid clients may act violently if they feel cornered or threatened; (2) immediately notify the treatment team and ensure additional staff availability per unit safety protocol. Parameters to monitor: client verbalizations for escalating threats (suicidal or homicidal content requires immediate safety protocol activation) and body language/behavioral cues for escalation toward physical aggression. Teaching during acute psychosis (option A) is contraindicated. Arguing against delusions (option C) increases anxiety and strengthens the delusion. Approaching from behind (option E) could startle a paranoid client and trigger violent self-protective behavior.`
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let questions=[];
function buildQuestions(){
  questions=RAW_Q.map((q,qi)=>{
    if(q.type==='mcq'){
      const idx=shuffle([0,1,2,3]);
      return{...q,choices:idx.map(i=>q.choices[i]),correctIndex:idx.indexOf(q.correctIndex),originalIndex:qi};
    }
    if(q.type==='sata'){
      const idx=shuffle(q.choices.map((_,i)=>i));
      return{...q,choices:idx.map(i=>q.choices[i]),correctIndices:q.correctIndices.map(ci=>idx.indexOf(ci)),originalIndex:qi};
    }
    if(q.type==='matrix'||q.type==='bowtie') return{...q,originalIndex:qi};
    return q;
  });
  // update header count
  document.getElementById('progressLabel').textContent=`0 of ${questions.length} answered`;
}

let answeredCount=0;
const answered={};

function updateProgress(){
  const pct=Math.round((answeredCount/questions.length)*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${answeredCount} of ${questions.length} answered`;
}

function render(){
  buildQuestions();
  answeredCount=0;Object.keys(answered).forEach(k=>delete answered[k]);
  const C=document.getElementById('questionsContainer');C.innerHTML='';
  document.getElementById('score-panel').style.display='none';document.getElementById('score-panel').innerHTML='';
  document.getElementById('unanswered-warning').style.display='none';
  document.getElementById('submitBtn').disabled=false;document.getElementById('submitBtn').style.opacity='1';
  updateProgress();

  questions.forEach((q,qi)=>{
    const card=document.createElement('div');card.className='q-card';card.id=`qcard-${qi}`;
    let html=`<div class="q-result-badge" id="badge-${qi}"></div>
      <div class="q-header"><div class="q-number">${qi+1}</div><div class="q-text">${q.stem}</div></div>`;

    if(q.type==='mcq'){
      html+=`<ul class="choices-list" id="choices-${qi}">`;
      q.choices.forEach((ch,ci)=>{html+=`<li class="choice-item" id="choice-${qi}-${ci}" onclick="selectMCQ(${qi},${ci})"><input type="radio" name="q${qi}" id="r${qi}-${ci}" value="${ci}"><label for="r${qi}-${ci}">${ch}</label></li>`;});
      html+=`</ul>`;
    }
    if(q.type==='sata'){
      html+=`<p class="q-instruction">Select all that apply.</p><ul class="choices-list" id="choices-${qi}">`;
      q.choices.forEach((ch,ci)=>{html+=`<li class="choice-item" id="choice-${qi}-${ci}" onclick="toggleSATA(${qi},${ci})"><input type="checkbox" name="q${qi}" id="cb${qi}-${ci}" value="${ci}"><label for="cb${qi}-${ci}">${ch}</label></li>`;});
      html+=`</ul>`;
    }
    if(q.type==='matrix'){
      html+=`<div class="matrix-wrap"><table class="matrix-table"><thead><tr><th>Finding / Action / Statement</th>${q.columns.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
      q.rows.forEach((row,ri)=>{html+=`<tr id="matrow-${qi}-${ri}"><td>${row.statement}<div class="mat-row-rationale" id="matrat-${qi}-${ri}">${row.rationale}</div></td>${q.columns.map((_,ci)=>`<td class="col-radio"><input type="radio" name="mat${qi}r${ri}" value="${ci}" onchange="matChange(${qi},${ri})"></td>`).join('')}</tr>`;});
      html+=`</tbody></table></div>`;
    }
    if(q.type==='bowtie'){
      // shuffle option arrays (keep indices mapped)
      const leftIdx=shuffle(q.leftOptions.map((_,i)=>i));
      const rightIdx=shuffle(q.rightOptions.map((_,i)=>i));
      const leftOpts=leftIdx.map(i=>q.leftOptions[i]);
      const rightOpts=rightIdx.map(i=>q.rightOptions[i]);
      // store shuffled mapping on card for grading
      card.dataset.leftMap=JSON.stringify(leftIdx);
      card.dataset.rightMap=JSON.stringify(rightIdx);
      html+=`<div class="bowtie-wrap"><div class="bowtie-grid">
        <div>
          <div class="bowtie-col-label">${q.leftLabel}</div>
          <div class="bowtie-select-group">
            <div class="bt-select-wrap"><label>Action 1</label><select class="bt-select" id="bt-L1-${qi}" onchange="btChange(${qi})"><option value="">— Select —</option>${leftOpts.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>
            <div class="bt-select-wrap"><label>Action 2</label><select class="bt-select" id="bt-L2-${qi}" onchange="btChange(${qi})"><option value="">— Select —</option>${leftOpts.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>
          </div>
        </div>
        <div class="bowtie-center"><span class="bt-label">${q.centerLabel}</span>${q.centerText}</div>
        <div>
          <div class="bowtie-col-label right">${q.rightLabel}</div>
          <div class="bowtie-select-group">
            <div class="bt-select-wrap"><label>Monitor 1</label><select class="bt-select" id="bt-R1-${qi}" onchange="btChange(${qi})"><option value="">— Select —</option>${rightOpts.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>
            <div class="bt-select-wrap"><label>Monitor 2</label><select class="bt-select" id="bt-R2-${qi}" onchange="btChange(${qi})"><option value="">— Select —</option>${rightOpts.map((o,i)=>`<option value="${i}">${o}</option>`).join('')}</select></div>
          </div>
        </div>
      </div></div>`;
    }
    html+=`<div class="rationale-block" id="rat-${qi}"><span class="rat-label">Rationale</span>${q.type==='matrix'?q.generalRationale:(q.type==='bowtie'?q.rationale:q.rationale)}</div>`;
    card.innerHTML=html;
    C.appendChild(card);
  });
}

function selectMCQ(qi,ci){
  if(answered[qi]!==undefined)return;
  document.getElementById(`r${qi}-${ci}`).checked=true;
  answered[qi]=ci;answeredCount++;updateProgress();
}
function toggleSATA(qi,ci){
  const cb=document.getElementById(`cb${qi}-${ci}`);cb.checked=!cb.checked;
  const any=document.querySelectorAll(`input[name="q${qi}"]:checked`).length>0;
  if(answered[qi]===undefined&&any){answered[qi]=true;answeredCount++;updateProgress();}
  if(!any&&answered[qi]!==undefined){delete answered[qi];answeredCount--;updateProgress();}
}
function matChange(qi,ri){
  const q=questions[qi];let filled=0;
  q.rows.forEach((_,r)=>{if(document.querySelector(`input[name="mat${qi}r${r}"]:checked`))filled++;});
  if(filled===1&&answered[qi]===undefined){answered[qi]=true;answeredCount++;updateProgress();}
}
function btChange(qi){
  const l1=document.getElementById(`bt-L1-${qi}`).value;
  const l2=document.getElementById(`bt-L2-${qi}`).value;
  const r1=document.getElementById(`bt-R1-${qi}`).value;
  const r2=document.getElementById(`bt-R2-${qi}`).value;
  const hasAny=l1||l2||r1||r2;
  const hasAll=l1&&l2&&r1&&r2;
  if(hasAny&&answered[qi]===undefined){answered[qi]=true;answeredCount++;updateProgress();}
  if(!hasAny&&answered[qi]!==undefined){delete answered[qi];answeredCount--;updateProgress();}
}

function submitExam(){
  const unanswered=[];
  questions.forEach((q,qi)=>{
    let has=false;
    if(q.type==='mcq')has=!!document.querySelector(`input[name="q${qi}"]:checked`);
    if(q.type==='sata')has=document.querySelectorAll(`input[name="q${qi}"]:checked`).length>0;
    if(q.type==='matrix')has=q.rows.every((_,ri)=>!!document.querySelector(`input[name="mat${qi}r${ri}"]:checked`));
    if(q.type==='bowtie'){const l1=document.getElementById(`bt-L1-${qi}`).value,l2=document.getElementById(`bt-L2-${qi}`).value,r1=document.getElementById(`bt-R1-${qi}`).value,r2=document.getElementById(`bt-R2-${qi}`).value;has=!!(l1&&l2&&r1&&r2);}
    if(!has)unanswered.push(qi+1);
  });
  if(unanswered.length>0){
    const w=document.getElementById('unanswered-warning');w.style.display='block';
    w.textContent=`⚠ Questions ${unanswered.slice(0,12).join(', ')}${unanswered.length>12?'…':''} are unanswered or incomplete. Click here to submit anyway.`;
    w.onclick=()=>{w.style.display='none';gradeExam();};return;
  }
  gradeExam();
}

function gradeExam(){
  let total=0,mcqS=0,mcqT=0,sataS=0,sataT=0,matS=0,matT=0,btS=0,btT=0;
  questions.forEach((q,qi)=>{
    const card=document.getElementById(`qcard-${qi}`);
    const badge=document.getElementById(`badge-${qi}`);
    const rat=document.getElementById(`rat-${qi}`);
    badge.style.display='inline-block';rat.style.display='block';

    if(q.type==='mcq'){
      mcqT++;
      const sel=document.querySelector(`input[name="q${qi}"]:checked`);
      const v=sel?parseInt(sel.value):-1;const ok=v===q.correctIndex;
      if(ok){mcqS++;total++;}
      card.classList.add(ok?'correct-card':'incorrect-card');badge.classList.add(ok?'correct':'incorrect');badge.textContent=ok?'✓ Correct':'✗ Incorrect';
      q.choices.forEach((_,ci)=>{const it=document.getElementById(`choice-${qi}-${ci}`);it.querySelector('input').disabled=true;if(ci===q.correctIndex)it.classList.add('correct-choice');else if(ci===v&&v!==q.correctIndex)it.classList.add('incorrect-choice');});
    }
    if(q.type==='sata'){
      sataT++;
      const checked=[...document.querySelectorAll(`input[name="q${qi}"]:checked`)].map(el=>parseInt(el.value));
      const cSet=new Set(q.correctIndices);const kSet=new Set(checked);
      const ok=q.correctIndices.every(i=>kSet.has(i))&&checked.every(i=>cSet.has(i));
      if(ok){sataS++;total++;}
      card.classList.add(ok?'correct-card':'incorrect-card');badge.classList.add(ok?'correct':'incorrect');badge.textContent=ok?'✓ Correct':'✗ Incorrect';
      q.choices.forEach((_,ci)=>{const it=document.getElementById(`choice-${qi}-${ci}`);it.querySelector('input').disabled=true;if(cSet.has(ci)&&kSet.has(ci))it.classList.add('correct-choice');else if(kSet.has(ci)&&!cSet.has(ci))it.classList.add('incorrect-choice');else if(cSet.has(ci)&&!kSet.has(ci))it.classList.add('missed-choice');});
    }
    if(q.type==='matrix'){
      matT++;let rowsOk=0;
      q.rows.forEach((row,ri)=>{
        const el=document.querySelector(`input[name="mat${qi}r${ri}"]:checked`);const v=el?parseInt(el.value):-1;const ok=v===row.correct;
        if(ok)rowsOk++;
        document.getElementById(`matrow-${qi}-${ri}`).classList.add(ok?'mat-correct':'mat-incorrect');
        const cr=document.querySelector(`input[name="mat${qi}r${ri}"][value="${row.correct}"]`);if(cr)cr.parentElement.style.background='rgba(74,222,128,0.2)';
        document.querySelectorAll(`input[name="mat${qi}r${ri}"]`).forEach(el=>el.disabled=true);
        document.getElementById(`matrat-${qi}-${ri}`).style.display='block';
      });
      const ok=rowsOk===q.rows.length;if(ok){matS++;total++;}
      card.classList.add(ok?'correct-card':'incorrect-card');badge.classList.add(ok?'correct':'incorrect');badge.textContent=ok?'✓ All Correct':`${rowsOk}/${q.rows.length} Rows Correct`;
    }
    if(q.type==='bowtie'){
      btT++;
      const cardEl=document.getElementById(`qcard-${qi}`);
      const leftMap=JSON.parse(cardEl.dataset.leftMap);
      const rightMap=JSON.parse(cardEl.dataset.rightMap);
      const l1v=document.getElementById(`bt-L1-${qi}`).value;
      const l2v=document.getElementById(`bt-L2-${qi}`).value;
      const r1v=document.getElementById(`bt-R1-${qi}`).value;
      const r2v=document.getElementById(`bt-R2-${qi}`).value;
      // map shuffled display indices back to original
      const selLeft=new Set([l1v,l2v].filter(v=>v!=='').map(v=>leftMap[parseInt(v)]));
      const selRight=new Set([r1v,r2v].filter(v=>v!=='').map(v=>rightMap[parseInt(v)]));
      const cLeft=new Set(q.correctLeft);const cRight=new Set(q.correctRight);
      const leftOk=[...cLeft].every(i=>selLeft.has(i))&&[...selLeft].every(i=>cLeft.has(i));
      const rightOk=[...cRight].every(i=>selRight.has(i))&&[...selRight].every(i=>cRight.has(i));
      const ok=leftOk&&rightOk;
      if(ok){btS++;total++;}
      card.classList.add(ok?'correct-card':'incorrect-card');badge.classList.add(ok?'correct':'incorrect');badge.textContent=ok?'✓ Correct':`${(leftOk?1:0)+(rightOk?1:0)}/2 Sides Correct`;
      // color the selects
      ['L1','L2'].forEach(side=>{
        const sel=document.getElementById(`bt-${side}-${qi}`);sel.disabled=true;
        sel.classList.add(leftOk?'correct-sel':'incorrect-sel');
      });
      ['R1','R2'].forEach(side=>{
        const sel=document.getElementById(`bt-${side}-${qi}`);sel.disabled=true;
        sel.classList.add(rightOk?'correct-sel':'incorrect-sel');
      });
    }
  });

  document.getElementById('submitBtn').disabled=true;document.getElementById('submitBtn').style.opacity='.5';
  const pct=Math.round((total/questions.length)*100);
  let gc,gt;
  if(pct>=90){gc='grade-a';gt='A — Excellent';}else if(pct>=80){gc='grade-b';gt='B — Proficient';}else if(pct>=70){gc='grade-c';gt='C — Developing';}else{gc='grade-d';gt='Below 70 — Keep Reviewing';}

  const panel=document.getElementById('score-panel');panel.style.display='block';
  panel.innerHTML=`
    <div class="score-headline">${pct}%</div>
    <div class="score-sub">${total} of ${questions.length} questions fully correct</div>
    <div class="score-grade ${gc}">${gt}</div>
    <div class="score-breakdown">
      <div class="score-breakdown-item"><span class="val">${mcqS}/${mcqT}</span><span class="lbl">Multiple Choice</span></div>
      <div class="score-breakdown-item"><span class="val">${sataS}/${sataT}</span><span class="lbl">Select All That Apply</span></div>
      <div class="score-breakdown-item"><span class="val">${matS}/${matT}</span><span class="lbl">Matrix</span></div>
      <div class="score-breakdown-item"><span class="val">${btS}/${btT}</span><span class="lbl">Bowtie</span></div>
    </div>
    <p style="margin-top:16px;font-size:13px;color:var(--text-muted);">Scroll down to review answers and rationales for every question.</p>`;
  document.getElementById('unanswered-warning').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetExam(){render();}
window.addEventListener('scroll',()=>{const b=document.getElementById('scrolltop-btn');b.style.display=window.scrollY>400?'flex':'none';});
render();
</script>
